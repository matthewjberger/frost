name: Rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Diagnose the native self-hosting crash
        run: |
          cargo build -r --bin frost
          ./target/release/frost --link -o /tmp/selfhosted bootstrap/frost.frost
          cp bootstrap/frost.frost /tmp/input.frost
          export FROST_BACKEND=asm
          export FROST_INPUT=/tmp/input.frost
          echo "stack limit: $(ulimit -s)"
          for i in $(seq 1 20); do
            /tmp/selfhosted > /tmp/out.s 2>/dev/null \
              || echo "run $i failed with status $?"
          done
          echo "done; last output was $(wc -l < /tmp/out.s) lines"
      - name: Run tests
        run: cargo test --verbose
