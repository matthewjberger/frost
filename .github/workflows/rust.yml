name: Rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --verbose
      # The same suite with every imported module reduced to what its interface
      # says it offers. Separate compilation is only sound if that is
      # sufficient, so it is checked on every commit rather than the day the
      # compiler starts relying on it. See docs/separate-compilation.md.
      - name: Run tests building imports from interfaces
        run: cargo test --verbose
        env:
          FROST_BUILD_FROM_INTERFACES: "1"
