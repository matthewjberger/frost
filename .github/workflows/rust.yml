name: Rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Diagnose the native self-hosting crash
        run: |
          echo "== alone, single threaded =="
          cargo test --test native native_self_hosting -- --test-threads=1 \
            2>&1 | tail -12
          echo "== alone, three times =="
          for i in 1 2 3; do
            cargo test --test native native_self_hosting 2>&1 \
              | grep -E 'test result|signal' || true
          done
      - name: Run tests
        run: cargo test --verbose
