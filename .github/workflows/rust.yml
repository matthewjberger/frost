name: Rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Diagnose the native self-hosting crash
        run: |
          sudo apt-get install -y valgrind
          cargo build -r --bin frost
          ./target/release/frost --link -o /tmp/selfhosted bootstrap/frost.frost
          export FROST_BACKEND=asm
          export FROST_INPUT=bootstrap/frost.frost
          valgrind --num-callers=20 /tmp/selfhosted \
            > /tmp/out.s 2>/tmp/vg.log || true
          head -60 /tmp/vg.log
      - name: Run tests
        run: cargo test --verbose
